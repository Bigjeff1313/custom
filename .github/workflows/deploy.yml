name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.127.253.212
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /root/deploy-customtextx.sh
          envs: GITHUB_REPO_URL
        env:
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}.git
